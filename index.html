<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>星辉传说 v2.5</title>
<style>
:root{--bg:#1a1a2e;--surface:#16213e;--primary:#4361ee;--accent:#f72585;--gold:#f7b731;--text:#e0e0e0;--text-dim:#999;--danger:#e74c3c;--success:#2ecc71;--warning:#f39c12}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100dvh;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
#game{width:100vw;height:100dvh;position:relative;overflow:hidden}
canvas{display:block}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.overlay>*{pointer-events:auto}
.map-name{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:6px 16px;border-radius:20px;font-weight:700;font-size:.9rem;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(5px);z-index:5}
.interact-hint{position:absolute;top:10px;right:10px;background:rgba(22,33,62,.9);padding:8px 12px;border-radius:8px;font-size:.8rem;border-left:3px solid var(--accent);max-width:200px;backdrop-filter:blur(5px);display:none}
.interact-hint.active{display:block}
.interact-hint .hint-title{font-weight:700;color:var(--accent)}
.npc-portrait{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);background:var(--surface);display:none;align-items:center;justify-content:center;font-size:60px;z-index:25}
.npc-portrait.active{display:flex}
.quick-bar{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px;z-index:15}
.quick-bar.collapsed{width:44px}
.quick-bar.collapsed .btn{width:44px;justify-content:center}
.quick-bar.collapsed .btn span:not(.icon){display:none}
.quick-bar.battle-hidden{display:none}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:0.9rem;font-weight:600;cursor:pointer;min-height:44px;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn:active{transform:scale(.96);opacity:.9}
.btn.gold{background:var(--gold);color:var(--bg)}
.btn.success{background:var(--success)}
.btn.warning{background:var(--warning)}
.btn.danger{background:var(--danger)}
.btn.outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn.small{padding:6px 10px;font-size:.8rem;min-height:36px}
.btn .icon{font-size:1.1em}
.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border-radius:12px;padding:20px;width:min(400px,92vw);max-height:70vh;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);display:none;overflow-y:auto;z-index:20}
.panel.active{display:block}
.panel h2{font-size:1.2rem;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.panel h3{font-size:1rem;margin:8px 0 4px;color:var(--accent)}
.panel-close-container{position:fixed;top:50%;left:50%;transform:translate(-50%,35vh);z-index:21;display:none}
.panel-close-container.active {
  display: block;
}
.panel-item{display:flex;align-items:center;padding:10px;border-radius:8px;cursor:pointer;transition:all .15s;gap:10px;margin-bottom:4px}
.panel-item:hover{background:rgba(255,255,255,.05)}
.panel-item.selected{border:2px solid var(--accent);background:rgba(247,37,133,.1)}
.hp-mini{height:4px;background:rgba(255,255,255,.1);border-radius:2px;flex:1;overflow:hidden}
.hp-mini-fill{height:100%;background:var(--success);transition:width .3s}
.hp-mini-fill.low{background:var(--danger)}
.battle-hud{position:absolute;bottom:0;left:0;right:0;background:rgba(22,33,62,.96);backdrop-filter:blur(10px);padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:2px solid rgba(255,255,255,.1);display:none}
.battle-hud.active{display:block}
.battle-status{position:absolute;top:10px;left:0;right:0;display:none;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px;z-index:10}
.battle-status .info{background:rgba(0,0,0,.6);border-radius:8px;padding:8px 10px;backdrop-filter:blur(5px);border:1px solid rgba(255,255,255,.1);min-width:140px}
.battle-status .name{font-weight:700;font-size:.85rem;display:flex;justify-content:space-between;align-items:center}
.battle-status .level{font-size:.7rem;color:#f7b731;font-weight:600}
.battle-status .hp{font-size:.7rem;color:var(--text-dim);margin:2px 0}
.capture-hint{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,.9);color:#1a1a2e;padding:6px 16px;border-radius:20px;font-size:.8rem;font-weight:700;z-index:12;display:none;animation:pulse 1s infinite}
.capture-hint.active{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.hp-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin:4px 0;overflow:hidden}
.hp-fill{height:100%;background:var(--success);transition:width .4s ease}
.hp-fill.low{background:var(--danger)}
.battle-menu{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.battle-menu.hidden{display:none}
.battle-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.battle-actions.hidden{display:none}
.switch-menu{display:grid;gap:6px}
.switch-menu.hidden{display:none}
.move-item{background:rgba(255,255,255,.05);border-radius:6px;padding:8px;position:relative;cursor:pointer;transition:all .15s}
.move-item:hover{background:rgba(255,255,255,.1)}
.move-item .move-name{font-size:.85rem;font-weight:600}
.move-item .move-pp{font-size:.7rem;opacity:.8}
.move-item .type-badge{position:absolute;top:4px;right:4px}
.move-item .dmg-mult{position:absolute;bottom:4px;right:4px;font-size:.7rem;font-weight:700;padding:1px 4px;border-radius:3px}
.move-item .dmg-mult.effective{background:var(--success);color:#fff}
.move-item .dmg-mult.weak{background:var(--danger);color:#fff}
.move-item .dmg-mult.normal{background:var(--text-dim);color:#fff}
.move-item.disabled{opacity:.5;cursor:not-allowed}
.message-box{position:absolute;bottom:120px;left:0;right:0;background:rgba(22,33,62,.93);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1);display:none;z-index:15}
.message-box.active{display:block}
.message-box .battle-result{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:.8rem}
.message-box .battle-result span{color:var(--gold)}
.dialog{position:absolute;bottom:0;left:0;right:0;background:rgba(22,33,62,.97);padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));border-top:2px solid rgba(255,255,255,.1);display:none;z-index:20}
.dialog.active{display:block}
.dialog .dtext{font-size:.9rem;margin-bottom:12px;line-height:1.5}
.dialog .choices{display:flex;flex-wrap:wrap;gap:8px}
.type-badge{padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.t-fire{background:#ff6b35;color:#fff}
.t-water{background:#4cc9f0;color:#333}
.t-grass{background:#70e000;color:#1a1a2e}
.t-electric{background:#ffd60a;color:#333}
.t-rock{background:#b5838d;color:#fff}
.t-ice{background:#90e0ef;color:#333}
.t-light{background:#ffef9f;color:#333}
.t-dark{background:#7209b7;color:#fff}
.t-normal{background:#999;color:#fff}
.pokemon-detail{display:none}
.pokemon-detail.active{display:block}
.pokemon-detail .detail-header{text-align:center;margin-bottom:16px}
.pokemon-detail .detail-sprite{width:80px;height:80px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:8px}
.pokemon-detail .detail-name{font-size:1.3rem;font-weight:700}
.pokemon-detail .detail-level{font-size:.9rem;color:var(--text-dim)}
.pokemon-detail .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.pokemon-detail .stat-item{background:rgba(255,255,255,.05);padding:6px;border-radius:6px}
.pokemon-detail .stat-label{font-size:.7rem;color:var(--text-dim)}
.pokemon-detail .stat-value{font-size:.9rem;font-weight:600}
.pokedex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;max-height:300px;overflow-y:auto}
.pokedex-item{text-align:center;padding:8px;border-radius:8px;background:rgba(255,255,255,.05);cursor:pointer}
.pokedex-item.seen{background:rgba(255,255,255,.1)}
.pokedex-item.caught{background:rgba(67,97,238,.2)}
.pokedex-item .pokedex-icon{width:60px;height:60px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px}
.pokedex-item .pokedex-name{font-size:.8rem;font-weight:600}
.pokedex-item .pokedex-types{font-size:.6rem;color:var(--text-dim)}
.pokedex-item .pokedex-unknown{opacity:.3}
.item-get{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(22,33,62,.95);padding:12px 20px;border-radius:10px;border:2px solid var(--gold);display:none;z-index:25}
.item-get.active{display:block}
.item-get .item-icon{font-size:2rem;text-align:center;margin-bottom:8px}
.item-get .item-text{text-align:center;font-weight:600}
.overlay-dim{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:25;display:none}
.overlay-dim.active{display:block}
/* 虚拟十字键 */
.virtual-dpad{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom, 0px));left:10px;z-index:20;display:none;flex-direction:column;gap:4px}
.virtual-dpad .dpad-row{display:flex;justify-content:center;gap:4px}
.virtual-dpad .dpad-btn{width:48px;height:48px;background:rgba(67,97,238,0.75);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;cursor:pointer;user-select:none;touch-action:none;border:2px solid rgba(255,255,255,0.3);transition:all .1s}
.virtual-dpad .dpad-btn:active{transform:scale(0.9);background:rgba(67,97,238,0.95)}

/* 移动端显示虚拟按键 */
@media(max-width:768px){
 .virtual-dpad{display:flex}
 .quick-bar{bottom:calc(160px + env(safe-area-inset-bottom, 0px))}
}
/* 战斗中隐藏虚拟按键 */
.virtual-dpad.battle-hidden{display:none}
@media(max-width:768px){.btn{font-size:.8rem;padding:10px}.quick-bar{right:5px;bottom:calc(5px + env(safe-area-inset-bottom, 0px))}.panel{width:96vw}}
</style>
</head>
<body>
<div class="overlay-dim" id="overlay-dim"></div>
<audio id="bgm" loop style="display:none"><source src="bgm/bgm.mp3" type="audio/mpeg"></audio>
<div id="panel-changelog" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border-radius:12px;padding:20px;width:min(450px,95vw);max-height:80vh;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);display:none;overflow-y:auto;z-index:30"><h2 style="text-align:center">星辉传说</h2><div style="text-align:center;font-size:1.5rem;font-weight:700;margin-bottom:8px">v2.5</div><div id="changelog-content" style="font-size:.85rem;line-height:1.6;max-height:50vh;overflow-y:auto"></div><button class="btn gold" id="btn-changelog-close" style="width:100%;margin-top:12px">开始冒险</button></div>
<!-- 虚拟十字键 -->
<div class="virtual-dpad" id="virtual-dpad">
<div class="dpad-row">
<div class="dpad-btn" id="dpad-up">↑</div>
</div>
<div class="dpad-row">
<div class="dpad-btn" id="dpad-left">←</div>
<div class="dpad-btn" id="dpad-right">→</div>
</div>
<div class="dpad-row">
<div class="dpad-btn" id="dpad-down">↓</div>
</div>
</div>

<div id="game">
<canvas id="canvas"></canvas>
<div class="overlay" id="overlay">
<div class="map-name" id="map-name"></div>
<div class="interact-hint" id="interact-hint"><div class="hint-title" id="hint-title"></div><div id="hint-text"></div></div>
<div class="npc-portrait" id="npc-portrait"></div>
<div class="quick-bar" id="quick-bar">
<button class="btn small outline" id="btn-collapse"><span class="icon">◀</span><span>收起</span></button>
<button class="btn small" id="btn-team"><span class="icon">👥</span><span>队伍</span></button>
<button class="btn small" id="btn-bag"><span class="icon">🎒</span><span>背包</span></button>
<button class="btn small" id="btn-pokedex"><span class="icon">📖</span><span>图鉴</span></button>
<button class="btn small" id="btn-info"><span class="icon">ℹ️</span><span>信息</span></button>
<button class="btn small" id="btn-minimap"><span class="icon">🗺️</span><span>缩略</span></button>
<button class="btn small" id="btn-save"><span class="icon">💾</span><span>保存</span></button>
</div>
<div class="panel" id="panel-team"><h2 style="margin:0 0 12px 0;padding:0 0 8px 0;border-bottom:1px solid rgba(255,255,255,.1)">精灵队伍</h2><div id="team-list"></div></div>
<div class="panel-close-container" data-panel="panel-team"><button class="btn outline small" id="btn-team-close">✕ 关闭</button></div>
<div class="panel" id="panel-bag"><h2 style="margin:0 0 12px 0;padding:0 0 8px 0;border-bottom:1px solid rgba(255,255,255,.1)">背包</h2><div id="bag-list"></div></div>
<div class="panel-close-container" data-panel="panel-bag"><button class="btn outline small" id="btn-bag-close">✕ 关闭</button></div>
<div class="panel" id="panel-pokedex"><h2 style="margin:0 0 12px 0;padding:0 0 8px 0;border-bottom:1px solid rgba(255,255,255,.1)">精灵图鉴</h2><div id="pokedex-list"></div></div>
<div class="panel-close-container" data-panel="panel-pokedex"><button class="btn outline small" id="btn-pokedex-close">✕ 关闭</button></div>
<div class="panel" id="panel-pokemon"><h2>精灵详情</h2><div id="pokemon-detail"></div></div>
<div class="panel-close-container" data-panel="panel-pokemon"><button class="btn outline" id="btn-pokemon-close">关闭</button></div>
<div class="panel" id="panel-minimap"><h2 style="margin:0 0 12px 0;padding:0 0 8px 0;border-bottom:1px solid rgba(255,255,255,.1)">地图缩略图</h2><canvas id="minimap-canvas" width="300" height="300" style="border:1px solid rgba(255,255,255,0.2);border-radius:8px;max-width:100%"></canvas><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px" id="minimap-legend"></div></div>
<div class="panel-close-container" data-panel="panel-minimap"><button class="btn outline small" id="btn-minimap-close">✕ 关闭</button></div>
<div class="panel" id="panel-starter"><h2 style="margin:0 0 12px 0;padding:0 0 8px 0;border-bottom:1px solid rgba(255,255,255,.1)">选择初始精灵</h2><div id="starter-list"></div><button class="btn gold" id="btn-confirm" style="width:100%;margin-top:12px">确认选择</button></div>
<div class="panel-close-container" data-panel="panel-starter"><button class="btn outline small" id="btn-starter-close">✕ 关闭</button></div>
<div class="battle-hud" id="battle-hud">
<div class="battle-menu" id="battle-menu">
<button class="btn" id="btn-fight"><span class="icon">⚔️</span>战斗</button>
<button class="btn" id="btn-switch"><span class="icon">🔄</span>更换</button>
<button class="btn" id="btn-bag-battle"><span class="icon">🎒</span>道具</button>
<button class="btn danger" id="btn-run"><span class="icon">🏃</span>逃跑</button>
</div>
<div class="battle-actions hidden" id="battle-actions"></div>
<div class="switch-menu hidden" id="switch-menu"></div>
</div>
<div class="battle-status" id="battle-status"><div class="info" id="p-info"></div><div class="info" id="e-info"></div></div>
<div class="capture-hint" id="capture-hint">快使用精灵球捕捉吧！</div>
<div class="message-box" id="message-box"><div class="text" id="msg-text"></div><div class="battle-result" id="battle-result" style="display:none"><span>经验+<span id="exp-gain">0</span></span><span>金币+<span id="money-gain">0</span></span></div></div>
<div class="dialog" id="dialog"><div class="dtext" id="dialog-text"></div><div class="choices" id="dialog-choices"></div></div>
<div class="item-get" id="item-get"><div class="item-icon" id="item-icon">💰</div><div class="item-text" id="item-text">获得金币+100</div></div>
</div>
</div>
<script>
// =========== 常量 ===========
const GAME_VERSION='2.5';
const CHANGELOG=[

 ]},
 {v:'2.4.2',items:[
  '界面优化：关闭按钮脱离弹窗放在下方独立显示',

 ]},
 {v:'2.4.1',items:[

 ]},
 {v:'2.4',items:[

  '20级超技能：爆裂燃烧/加农水炮/疯狂植物',

  'PWA 离线支持',
 ]}
];

const TYPES=['fire','water','grass','electric','rock','ice','light','dark'];
const TYPE_CHART={
 fire:{strong:['ice','grass'],weak:['water','rock'],immune:['dark']},
 water:{strong:['fire','ice'],weak:['grass','electric'],immune:['ice']},
 grass:{strong:['water','light'],weak:['fire','ice'],immune:['light']},
 electric:{strong:['water','ice'],weak:['grass','rock'],immune:[]},
 rock:{strong:['electric','fire'],weak:['grass','ice'],immune:[]},
 ice:{strong:['grass'],weak:['water'],immune:[]},
 light:{strong:['dark'],weak:['dark'],immune:[]},
 dark:{strong:['light'],weak:['light'],immune:[]}
};
const TYPE_COLORS={'fire':'t-fire','water':'t-water','grass':'t-grass','electric':'t-electric','rock':'t-rock','ice':'t-ice','light':'t-light','dark':'t-dark','normal':'t-normal'};
const TYPE_HEX={'fire':'#ff6b35','water':'#4cc9f0','grass':'#70e000','electric':'#ffd60a','rock':'#b5838d','ice':'#90e0ef','light':'#ffef9f','dark':'#7209b7','normal':'#999'};
const TYPE_ICONS={'fire':'🔥','water':'💧','grass':'🌿','electric':'⚡','rock':'🪨','ice':'❄️','light':'✨','dark':'🌑','normal':'⚪'};

const MOVES={
 scratch:{name:'抓击',type:'normal',category:'physical',power:40,acc:100,pp:35},

let SPRITES_LOADED = {};

// 精灵图片加载器
function loadSpriteImages(){
  const promises = [];
  const total = Object.keys(SPRITES).length;
  let loaded = 0;
  
  Object.keys(SPRITES).forEach(id => {
    const sprite = SPRITES[id];
    if (!sprite) return;
    const imgPath = `sprites/${id}.png`;
    
    if (SPRITES_LOADED[id] === imgPath && sprite.image) {
      loaded++;
      promises.push(Promise.resolve());
      return;
    }
    
    const promise = new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        SPRITES[id].image = img;
        SPRITES_LOADED[id] = imgPath;
        loaded++;
        console.log(`✅ 精灵 ${id} 立绘已加载 (${loaded}/${total})`);
        resolve();
      };
      img.onerror = () => {
        console.warn(`❌ 无法加载精灵图片: ${imgPath}`);
        SPRITES[id].image = null;
        loaded++;
        resolve();
      };
      img.src = imgPath;
    });
    promises.push(promise);
  });
  
  console.log(`📊 开始加载 ${total} 张精灵立绘...`);
  return Promise.all(promises).then(() => {
    console.log(`🎉 精灵立绘加载完成: ${loaded}/${total}`);
  console.log('立绘加载验证:');
  Object.keys(SPRITES).slice(0, 5).forEach(id => {
    console.log(`${id}: image=${SPRITES[id].image ? '✅' : '❌'}, src=${SPRITES[id].image?.src || 'null'}`);
  });
  });
}

// 生成地图瓦片
Object.values(MAPS).forEach(m=>{
 m.tiles=Array(m.w*m.h).fill(null).map((_,i)=>{
  const x=i%m.w,y=Math.floor(i/m.w);
  if(y===0||y===m.h-1||x===0||x===m.w-1)return{obstacle:true};
  if(m.w>5&&x>3&&x<m.w-4&&y>3&&y<m.h-4&&Math.random()<0.08)return{obstacle:true};
  return{obstacle:false};
 });

// =========== 工具函数 ===========
function random(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function calculateStats(species,level,ivs,evs){
 const base=species.base;
 const calc=(b,iv,ev,stat)=>{
  if(stat==='hp') return Math.floor((2*b+iv+Math.floor(ev/4))*level/100)+level+10;
  return Math.floor((2*b+iv+Math.floor(ev/4))*level/100)+5;
 };
 return{
  hp:calc(base.hp,ivs.hp,evs.hp,'hp'),
  atk:calc(base.atk,ivs.atk,evs.atk,'atk'),
  def:calc(base.def,ivs.def,evs.def,'def'),
  spa:calc(base.spa,ivs.spa,evs.spa,'spa'),
  spd:calc(base.spd,ivs.spd,evs.spd,'spd'),
  spe:calc(base.spe,ivs.spe,evs.spe,'spe')
 };
}

function createPokemon(id,level=5){
 const species=POKEDEX[id];
 if(!species) return null;
 
 const ivs={
  hp:random(0,31),atk:random(0,31),def:random(0,31),
  spa:random(0,31),spd:random(0,31),spe:random(0,31)
 };
 const evs={hp:0,atk:0,def:0,spa:0,spd:0,spe:0};
 const stats=calculateStats(species,level,ivs,evs);
 
 const moves=species.moves
  .filter(m=>m.level<=level)
  .map(m=>({
   ...MOVES[m.move],
   id:m.move,
   pp:MOVES[m.move].pp,
   maxPp:MOVES[m.move].pp
  }));
 
 return{
  id:species.id,
  name:species.name,
  types:[...species.types],
  level:level,
  ivs:ivs,
  evs:evs,
  stats:stats,
  hp:stats.hp,
  maxHp:stats.hp,
  moves:moves,
  exp:0,
  expToNext:level*level*10,
  captureRate:species.captureRate||null
 };
}

function typeMultiplier(attackType,defenseTypes){
 let multiplier=1.0;
 const chart=TYPE_CHART[attackType];
 if(!chart) return 1.0;
 
 defenseTypes.forEach(defType=>{
  if(chart.immune&&chart.immune.includes(defType)) multiplier=0;
  if(chart.strong&&chart.strong.includes(defType)) multiplier*=2;
  if(chart.weak&&chart.weak.includes(defType)) multiplier*=0.5;
 });
 return multiplier;
}

function getTypeHex(type){return TYPE_HEX[type]||'#999';}

// =========== 精灵经验系统 ===========
function giveExpToAll(expAmount){
 const evoResults=[];
 state.team.forEach(pokemon=>{
  if(pokemon.hp<=0) return;
  pokemon.exp+=expAmount;
  while(pokemon.exp>=pokemon.expToNext){
   pokemon.level++;
   pokemon.exp-=pokemon.expToNext;
   pokemon.expToNext=pokemon.level*pokemon.level*10;
   
   const species=POKEDEX[pokemon.id];
   const newStats=calculateStats(species,pokemon.level,pokemon.ivs,pokemon.evs);
   const hpDiff=newStats.hp-pokemon.stats.hp;
   pokemon.stats=newStats;
   pokemon.maxHp=newStats.hp;
   pokemon.hp+=hpDiff;
   
   pokemon.moves.forEach(move=>{
    move.pp=move.maxPp;
   });
   
   // 学习新技能
   if(species.moves){
    species.moves.filter(m=>m.level===pokemon.level).forEach(m=>{
     const moveData=MOVES[m.move];
     const existing=pokemon.moves.find(pm=>pm.id===m.move);
     if(!existing){
      if(pokemon.moves.length>=4){
       pokemon.moves.shift();
      }
      pokemon.moves.push({
       ...moveData,
       id:m.move,
       pp:moveData.pp,
       maxPp:moveData.pp
      });
      evoResults.push({pokemon:pokemon.name,type:'skill',name:moveData.name});
     }
    });
   }
   
   // 进化检查
   if(species&&species.evo&&pokemon.level>=species.evo.level){
    const newSpecies=POKEDEX[species.evo.to];
    if(newSpecies){
     const oldName=pokemon.name;
     pokemon.id=newSpecies.id;
     pokemon.name=newSpecies.name;
     pokemon.types=[...newSpecies.types];
     state.seen[newSpecies.id]=true;
     state.caught[newSpecies.id]=true;
     const evolvedStats=calculateStats(newSpecies,pokemon.level,pokemon.ivs,pokemon.evs);
     const evolvedHpDiff=evolvedStats.hp-pokemon.stats.hp;
     pokemon.stats=evolvedStats;
     pokemon.maxHp=evolvedStats.hp;
     pokemon.hp+=evolvedHpDiff;
     
     newSpecies.moves.filter(m=>m.level<=pokemon.level).forEach(m=>{
      if(!pokemon.moves.find(pm=>pm.id===m.move)){
       if(pokemon.moves.length>=4) pokemon.moves.shift();
       pokemon.moves.push({
        ...MOVES[m.move],
        id:m.move,
        pp:MOVES[m.move].pp,
        maxPp:MOVES[m.move].pp
       });
      }
     });
     
     evoResults.push({pokemon:oldName,type:'evo',to:newSpecies.name});
    }
   }
  }
 });
 
 state.storage.forEach(pokemon=>{
  pokemon.exp+=Math.floor(expAmount*0.5);
 });
 
 return evoResults;
}

function spawnWildPokemon(){
 const spawnInfo=WILD_SPAWNS[state.currentMap];
 if(!spawnInfo) return;
 
 if(spawnInfo.fixed){
  // 固定刷新：检查是否已经有一只
  const existing=state.wildPokemon.filter(w=>w.map===state.currentMap);
  if(existing.length>0) return;
  
  const spot=spawnInfo.positions[0];
  const pokemonId=spawnInfo.pokemon[0];
  const species=POKEDEX[pokemonId];
  const wild=createPokemon(pokemonId,20);
  wild.map=state.currentMap;
  wild.x=spot.x;
  wild.y=spot.y;
  state.wildPokemon.push(wild);
  return;
 }
 
 state.wildPokemon=[];
 const spawnCount=random(3,5);
 const availableSpots=[...spawnInfo.positions].sort(()=>Math.random()-0.5);
 
 for(let i=0;i<Math.min(spawnCount,availableSpots.length);i++){
  const spot=availableSpots[i];
  const pokemonId=spawnInfo.pokemon[random(0,spawnInfo.pokemon.length-1)];
  const species=POKEDEX[pokemonId];
  
  state.wildPokemon.push({
   id:pokemonId,
   x:spot.x,
   y:spot.y,
   species:species,
   sprite:SPRITES[pokemonId],
   moveTimer:0
  });
 }
}

function updateWildPokemon(){
 state.wildPokemon.forEach(p=>{
  p.moveTimer++;
  if(p.moveTimer>60){
   p.moveTimer=0;
   const directions=['up','down','left','right'];
   const dir=directions[random(0,3)];
   let nx=p.x,ny=p.y;
   
   switch(dir){
    case 'up':ny--;break;
    case 'down':ny++;break;
    case 'left':nx--;break;
    case 'right':nx++;break;
   }
   
   const map=MAPS[state.currentMap];
   if(nx>=0&&nx<map.w&&ny>=0&&ny<map.h){
    const idx=ny*map.w+nx;
    if(!map.tiles[idx]||!map.tiles[idx].obstacle){
     p.x=nx;
     p.y=ny;
    }
   }
  }
 });
}

function checkWildEncounter(){
 const playerX=state.player.x;
 const playerY=state.player.y;
 
 for(let i=state.wildPokemon.length-1;i>=0;i--){
  const p=state.wildPokemon[i];
  // 缩小判定范围：必须相邻（距离为1）
  if(Math.abs(p.x-playerX)<=1&&Math.abs(p.y-playerY)<=1){
   const level=random(2,6)+state.badges*3;
   const wild=createPokemon(p.id,level);
   state.wildPokemon.splice(i,1);
   startBattle(wild);
   return true;
  }
 }
 return false;
}

// =========== 画布系统 ===========
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H,TILE_SIZE=48;

function resize(){
 W=canvas.width=window.innerWidth;
 H=canvas.height=window.innerHeight;
 TILE_SIZE=Math.min(
  W/MAPS[state.currentMap].w,
  H/MAPS[state.currentMap].h,
  64
 );
}
window.addEventListener('resize',()=>{resize();render();});
resize();

const MAP_COLORS={
 'start-town':{bg:'#7BC950',tree:'#3A7D44'},
 'route1':{bg:'#5A9E4B',tree:'#2E6B33'},
 'port-town':{bg:'#DEB887',tree:'#7BA05B'},
 'route2':{bg:'#FFD8B1',tree:'#7BA05B'},
 'mine-town':{bg:'#8B7355',tree:'#4A6B3A'},
 'cave':{bg:'#333333',tree:'#555555'},
 'deep-beach':{bg:'#90E0EF',tree:'#4A90A4'}
};

function getMapColors(mapName){
 return MAP_COLORS[mapName]||{bg:'#7BC950',tree:'#3A7D44'};
}

function render(){
 ctx.clearRect(0,0,W,H);
 if(state.scene==='world') renderWorld();
 else if(state.scene==='battle') renderBattle();
}

function renderWorld(){
 const map=MAPS[state.currentMap];
 if(!map) return;
 
 const offsetX=W/2-state.player.x*TILE_SIZE-TILE_SIZE/2;
 const offsetY=H/2-state.player.y*TILE_SIZE-TILE_SIZE/2;
 const colors=getMapColors(state.currentMap);
 
 document.getElementById('map-name').textContent=map.name;
 
 ctx.fillStyle=colors.bg;
 ctx.fillRect(0,0,W,H);
 
 for(let y=0;y<map.h;y++){
  for(let x=0;x<map.w;x++){
   const idx=y*map.w+x;
   const tile=map.tiles[idx];
   const tx=offsetX+x*TILE_SIZE,ty=offsetY+y*TILE_SIZE;
   
   if(tile&&tile.obstacle){
    // 阴影
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(tx+TILE_SIZE/2,ty+TILE_SIZE*0.85,TILE_SIZE/3,TILE_SIZE/8,0,0,Math.PI*2);
    ctx.fill();
    // 树干
    ctx.fillStyle='#5D4037';
    ctx.fillRect(tx+TILE_SIZE/2-TILE_SIZE/12,ty+TILE_SIZE*0.5,TILE_SIZE/6,TILE_SIZE*0.4);
    // 树冠底层
    ctx.beginPath();
    ctx.arc(tx+TILE_SIZE/2,ty+TILE_SIZE*0.35,TILE_SIZE/2.5,0,Math.PI*2);
    ctx.fillStyle='#2E7D32';
    ctx.fill();
    // 树冠上层高光
    ctx.beginPath();
    ctx.arc(tx+TILE_SIZE/2-TILE_SIZE/8,ty+TILE_SIZE*0.28,TILE_SIZE/4.5,0,Math.PI*2);
    ctx.fillStyle='#43A047';
    ctx.fill();
    // 高光点
    ctx.beginPath();
    ctx.arc(tx+TILE_SIZE/2-TILE_SIZE/6,ty+TILE_SIZE*0.2,TILE_SIZE/12,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fill();
   }else{
    ctx.fillStyle=colors.bg;
    ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.lineWidth=1;
    ctx.strokeRect(tx,ty,TILE_SIZE,TILE_SIZE);
   }
  }
 }
 
 // 绘制出口
 if(map.exits) map.exits.forEach(e=>{
  const ex=offsetX+e.x*TILE_SIZE,ey=offsetY+e.y*TILE_SIZE;
  ctx.fillStyle='rgba(212,165,116,0.8)';
  ctx.fillRect(ex,ey,TILE_SIZE,TILE_SIZE);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.moveTo(ex+TILE_SIZE/2,ey+TILE_SIZE/4);
  ctx.lineTo(ex+TILE_SIZE/4,ey+TILE_SIZE*3/4);
  ctx.lineTo(ex+TILE_SIZE*3/4,ey+TILE_SIZE*3/4);
  ctx.closePath();
  ctx.fill();
  
  // 闪光指引：水手对话后，route2的出口显示闪光
  if(state.sailorTalked&&state.currentMap==='route2'&&e.to==='mine-town'){
   const glow=Math.sin(Date.now()/300)*0.3+0.7;
   ctx.strokeStyle=`rgba(144,224,239,${glow})`;
   ctx.lineWidth=3;
   ctx.strokeRect(ex-2,ey-2,TILE_SIZE+4,TILE_SIZE+4);
   ctx.fillStyle=`rgba(144,224,239,${glow*0.3})`;
   ctx.fillRect(ex-2,ey-2,TILE_SIZE+4,TILE_SIZE+4);
  }
 });
 
 // 绘制物品
 if(map.items) map.items.forEach(it=>{
  const key=`${state.currentMap}_${it.x}_${it.y}`;
  if(state.collectedItems[key]) return;
  
  const ix=offsetX+it.x*TILE_SIZE+TILE_SIZE/2;
  const iy=offsetY+it.y*TILE_SIZE+TILE_SIZE/2;
  const pulse=Math.sin(Date.now()/500)*0.2+0.8;
  const size=TILE_SIZE/3*pulse;
  
  ctx.beginPath();
  ctx.arc(ix,iy+2,size*0.8,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(ix,iy,size,0,Math.PI*2);
  ctx.fillStyle=it.type==='money'?'#f7b731':'#EF476F';
  ctx.fill();
  
  ctx.fillStyle='#fff';
  ctx.font=`bold ${size*0.6}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const icon={money:'💰',pokeball:'🔴','great-ball':'🔵',potion:'💊','super-potion':'💊'}[it.type]||'❓';
  ctx.fillText(icon,ix,iy);
 });
 
 // 绘制野生精灵
 state.wildPokemon.forEach(p=>{
  const wx=offsetX+p.x*TILE_SIZE+TILE_SIZE/2;
  const wy=offsetY+p.y*TILE_SIZE+TILE_SIZE/2;
  const pulse=Math.sin(Date.now()/500+p.x*10)*0.1+0.9;
  const size=TILE_SIZE/2*pulse;
  
  ctx.beginPath();
  ctx.arc(wx,wy+2,size*0.8,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(wx,wy,size,0,Math.PI*2);
  ctx.fillStyle=p.sprite.color;
  ctx.fill();
  
  if(p.sprite.image){
   ctx.save();
   ctx.beginPath();
   ctx.arc(wx,wy,size*0.9,0,Math.PI*2);
   ctx.clip();
   ctx.drawImage(p.sprite.image,wx-size*0.8,wy-size*0.8,size*1.6,size*1.6);
   ctx.restore();
  }else{
   ctx.fillStyle='#fff';
   ctx.font=`bold ${size*0.6}px sans-serif`;
   ctx.textAlign='center';
   ctx.textBaseline='middle';
   ctx.fillText(p.sprite.icon,wx,wy);
  }
  
  // 精灵名称
  ctx.font='bold 10px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.fillText(p.species.name,wx,wy-size-5);
 });
 
 // 绘制NPC
 if(map.npcs) map.npcs.forEach(n=>{
  const nx=offsetX+n.x*TILE_SIZE+TILE_SIZE/2;
  const ny=offsetY+n.y*TILE_SIZE+TILE_SIZE/2;
  const npcInfo=NPC_ICONS[n.name]||NPC_ICONS['老人'];
  
  ctx.beginPath();
  ctx.arc(nx,ny+3,TILE_SIZE/3,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(nx,ny,TILE_SIZE/3,0,Math.PI*2);
  ctx.fillStyle=npcInfo.color;
  ctx.fill();
  
  ctx.fillStyle='#fff';
  ctx.font=`bold ${TILE_SIZE/4}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(npcInfo.icon,nx,ny);
  
  // NPC名称
  const nameWidth=ctx.measureText(npcInfo.name||n.name).width+10;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(nx-nameWidth/2,ny-TILE_SIZE/2-15,nameWidth,14);
  ctx.fillStyle='#fff';
  ctx.font='bold 10px sans-serif';
  ctx.fillText(npcInfo.name||n.name,nx,ny-TILE_SIZE/2-7);
 });
 
 // 绘制玩家
 const px=offsetX+state.player.x*TILE_SIZE+TILE_SIZE/2;
 const py=offsetY+state.player.y*TILE_SIZE+TILE_SIZE/2+Math.sin(state.player.anim||0)*3;
 
 ctx.beginPath();
 ctx.arc(px,py+4,TILE_SIZE/2.5,0,Math.PI*2);
 ctx.fillStyle='rgba(0,0,0,0.3)';
 ctx.fill();
 
 ctx.beginPath();
 ctx.arc(px,py,TILE_SIZE/2.5,0,Math.PI*2);
 ctx.fillStyle='#EF476F';
 ctx.fill();
 
 ctx.beginPath();
 ctx.arc(px,py,TILE_SIZE/6,0,Math.PI*2);
 ctx.fillStyle='#fff';
 ctx.fill();
 
 const dirOffset={
  up:{x:0,y:-TILE_SIZE/3},
  down:{x:0,y:TILE_SIZE/3},
  left:{x:-TILE_SIZE/3,y:0},
  right:{x:TILE_SIZE/3,y:0}
 }[state.player.dir];
 ctx.beginPath();
 ctx.arc(px+dirOffset.x,py+dirOffset.y,TILE_SIZE/10,0,Math.PI*2);
 ctx.fillStyle='#06D6A0';
 ctx.fill();
 
 // 绘制跟随精灵
 if(state.follower){
  const fTeam=state.team.find(p=>p.id===state.follower);
  if(fTeam){
   const fSprite=SPRITES[fTeam.id]||SPRITES['001'];
   let fOffsetX=0,fOffsetY=0;
   switch(state.player.dir){
    case 'up':fOffsetY=TILE_SIZE;break;
    case 'down':fOffsetY=-TILE_SIZE;break;
    case 'left':fOffsetX=TILE_SIZE;break;
    case 'right':fOffsetX=-TILE_SIZE;break;
   }
   const fx=px+fOffsetX,fy=py+fOffsetY;
   const fSize=TILE_SIZE/2;
   ctx.beginPath();
   ctx.arc(fx,fy+2,fSize*0.4,0,Math.PI*2);
   ctx.fillStyle='rgba(0,0,0,0.3)';
   ctx.fill();
   ctx.beginPath();
   ctx.arc(fx,fy,fSize*0.4,0,Math.PI*2);
   ctx.fillStyle=fSprite.color;
   ctx.fill();
   if(fSprite.image){
    ctx.save();
    ctx.beginPath();
    ctx.arc(fx,fy,fSize*0.35,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(fSprite.image,fx-fSize*0.32,fy-fSize*0.32,fSize*0.64,fSize*0.64);
    ctx.restore();
   }else{
    ctx.fillStyle='#fff';
    ctx.font=`bold ${fSize*0.4}px sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(fSprite.icon,fx,fy);
   }
  }
 }
}

function renderBattle(){
 const gradient=ctx.createLinearGradient(0,0,0,H*0.6);
 gradient.addColorStop(0,'#1a1a2e');
 gradient.addColorStop(1,'#4a69bd');
 ctx.fillStyle=gradient;
 ctx.fillRect(0,0,W,H*0.6);
 
 ctx.fillStyle='#2d5016';
 ctx.fillRect(0,H*0.6,W,H*0.4);
 ctx.fillStyle='#3a6b20';
 ctx.fillRect(0,H*0.6,W,4);
 
 const battle=state.battle;
 if(!battle) return;
 
 const enemySprite=SPRITES[battle.enemy.id]||SPRITES['010'];
 ctx.fillStyle='rgba(255,255,255,0.1)';
 ctx.beginPath();
 ctx.arc(W-60,H*0.4,50,0,Math.PI*2);
 ctx.fill();
 ctx.beginPath();
 ctx.arc(W-60,H*0.4,40,0,Math.PI*2);
 ctx.fillStyle=enemySprite.color;
 ctx.fill();
 
 if(enemySprite.image){
  ctx.save();
  ctx.beginPath();
  ctx.arc(W-60,H*0.4,35,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(enemySprite.image,W-60-32,H*0.4-32,64,64);
  ctx.restore();
 }else{
  ctx.fillStyle='#fff';
  ctx.font='bold 32px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(enemySprite.icon,W-60,H*0.4);
 }
 
 const playerSprite=SPRITES[battle.player.id]||SPRITES['001'];
 ctx.fillStyle='rgba(255,255,255,0.1)';
 ctx.beginPath();
 ctx.arc(60,H*0.65,50,0,Math.PI*2);
 ctx.fill();
 ctx.beginPath();
 ctx.arc(60,H*0.65,40,0,Math.PI*2);
 ctx.fillStyle=playerSprite.color;
 ctx.fill();
 
 if(playerSprite.image){
  ctx.save();
  ctx.beginPath();
  ctx.arc(60,H*0.65,35,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(playerSprite.image,60-32,H*0.65-32,64,64);
  ctx.restore();
 }else{
  ctx.fillStyle='#fff';
  ctx.font='bold 32px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(playerSprite.icon,60,H*0.65);
 }
}

canvas.addEventListener('click',e=>{

});

let touchStart=null;
canvas.addEventListener('touchstart',e=>{
 touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
canvas.addEventListener('touchend',e=>{
 if(!touchStart) return;
 const dx=e.changedTouches[0].clientX-touchStart.x;
 const dy=e.changedTouches[0].clientY-touchStart.y;
 if(Math.abs(dx)>Math.abs(dy)){
  movePlayer(dx>0?'right':'left');
 }else{
  movePlayer(dy>0?'down':'up');
 }
 touchStart=null;
});

function setupVirtualDpad(){
 const btnUp=document.getElementById('dpad-up');
 const btnDown=document.getElementById('dpad-down');
 const btnLeft=document.getElementById('dpad-left');
 const btnRight=document.getElementById('dpad-right');

 const addButtonEvents=(btn,action)=>{
  if(!btn) return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();action();});
  btn.addEventListener('mousedown',e=>{e.preventDefault();action();});
 };

 addButtonEvents(btnUp,()=>movePlayer('up'));
 addButtonEvents(btnDown,()=>movePlayer('down'));
 addButtonEvents(btnLeft,()=>movePlayer('left'));
 addButtonEvents(btnRight,()=>movePlayer('right'));
}
setupVirtualDpad();

function movePlayer(direction){
 const map=MAPS[state.currentMap];
 let newX=state.player.x,newY=state.player.y;
 state.player.dir=direction;
 
 switch(direction){
  case 'up':newY--;break;
  case 'down':newY++;break;
  case 'left':newX--;break;
  case 'right':newX++;break;
 }
 
 if(newX<0||newX>=map.w||newY<0||newY>=map.h) return;
 const idx=newY*map.w+newX;
 if(map.tiles[idx]&&map.tiles[idx].obstacle) return;
 
 // NPC碰撞检测
 if(map.npcs){
  const npcCollision=map.npcs.find(n=>n.x===newX&&n.y===newY);
  if(npcCollision){
   // 靠近NPC自动触发交互
   interactNPC(npcCollision);
   return;
  }
 }
 
 state.player.x=newX;
 state.player.y=newY;
 state.player.anim=(state.player.anim||0)+0.5;
 
 if(map.exits){
  const exit=map.exits.find(e=>e.x===newX&&e.y===newY);
  if(exit){
   // 检查海滩深处锁定
   if(exit.to === 'deep-beach' && !state.sailorTalked){
    showDialog('需要先与港口镇水手对话才能进入海滩深处！');
    return;
   }
   state.currentMap=exit.to;
   state.player.x=exit.tx;
   state.player.y=exit.ty;
   spawnWildPokemon();
  }
 }
 
 checkMapItems();
 updateWildPokemon();
 
 if(!checkWildEncounter()){
  updateInteractHint();
  render();
 }
}

function interact(){
 const map=MAPS[state.currentMap];
 if(!map||!map.npcs) return;
 
 const player=state.player;
 const checkPositions={
  up:{x:player.x,y:player.y-1},
  down:{x:player.x,y:player.y+1},
  left:{x:player.x-1,y:player.y},
  right:{x:player.x+1,y:player.y}
 };
 const pos=checkPositions[player.dir];
 const npc=map.npcs.find(n=>n.x===pos.x&&n.y===pos.y);
 
 if(npc) interactNPC(npc);
 updateInteractHint();
 render();
}

function interactNPC(npc){
 state.currentNPC=npc;
 showNPCPortrait(npc.name);
 
 if(npc.heal){
  showChoices(`护士：要治疗你的精灵吗？（免费）`,[
   {text:'是的',action:()=>{
    state.team.forEach(p=>{
     p.hp=p.maxHp;
     p.moves.forEach(move=>{move.pp=move.maxPp;});
    });
    hideNPCPortrait();
    showDialog('全部精灵已恢复健康！PP也已完全恢复！');
   }},
   {text:'不用了',action:()=>{hideNPCPortrait();}}
  ]);
 }else if(npc.shop){
  showShop([
   {id:'pokeball',name:'精灵球',price:200,desc:'捕捉野生精灵'},
   {id:'potion',name:'伤药',price:300,desc:'恢复20HP'}
  ]);
 }else if(npc.shop2){
  showShop([
   {id:'great-ball',name:'超级球',price:600,desc:'更好的捕捉球'},
   {id:'super-potion',name:'好伤药',price:700,desc:'恢复50HP'},
   {id:'space-capsule',name:'空间胶囊',price:1000,desc:'存储多余精灵'}
  ]);
 }else if(npc.gym){
  if(!state.team.length){
   hideNPCPortrait();
   showDialog('你需要先有精灵！');
   return;
  }
  showChoices('道馆训练家向你发起挑战！',[
   {text:'迎战',action:()=>{hideNPCPortrait();startGym();}},
   {text:'先看看',action:()=>{hideNPCPortrait();}}
  ]);
 }else if(npc.battle){
  showChoices(`${npc.name}：要和我对战吗？`,[
   {text:'对战',action:()=>{hideNPCPortrait();startTrainerBattle(npc);}},
   {text:'下次吧',action:()=>{hideNPCPortrait();}}
  ]);
 }else if(npc.legendary){
  const legendary=createPokemon('999',20);
  hideNPCPortrait();
  startBattle(legendary,{legendary:true});
 }else if(npc.sailor){
  // 水手对话：触发冰系精灵指引
  state.sailorTalked=true;
  showDialog(npc.dlg[0],()=>{
   showDialog(npc.dlg[1],()=>{
    showDialog('阳光海滩的出口出现了神秘的闪光...',hideNPCPortrait);
   });
  });
 }else if(npc.reward){
  const key=`reward_${npc.name}`;
  if(state.collectedItems[key]){
   showDialog(npc.dlg[0],hideNPCPortrait);
  }else{
   state.collectedItems[key]=true;
   state.money+=npc.reward;
   showDialog(npc.dlg[0],()=>{
    showDialog(`获得 ${npc.reward} 金币！`,()=>{
     showDialog(npc.dlg[1],hideNPCPortrait);
    });
   });
  }
 }else if(npc.dlg){
  showDialog(npc.dlg[0],()=>{
   if(npc.dlg.length>1) showDialog(npc.dlg[1],hideNPCPortrait);
   else hideNPCPortrait();
  });
 }
}

function renderMinimap(){
 const map=MAPS[state.currentMap];
 if(!map) return;
 const canvas2=document.getElementById('minimap-canvas');
 const ctx2=canvas2.getContext('2d');
 const size=Math.min(300,280);
 const cellSize=Math.floor(size/Math.max(map.w,map.h));
 const ox=(size-cellSize*map.w)/2;
 const oy=(size-cellSize*map.h)/2;
 const colors=getMapColors(state.currentMap);
 
 ctx2.fillStyle='#1a1a2e';
 ctx2.fillRect(0,0,canvas2.width,canvas2.height);
 
 for(let y=0;y<map.h;y++){
  for(let x=0;x<map.w;x++){
   const idx=y*map.w+x;
   const tile=map.tiles[idx];
   const cx=ox+x*cellSize+cellSize/2,cy=oy+y*cellSize+cellSize/2;
   if(tile&&tile.obstacle){
    ctx2.fillStyle='#2E7D32';
    ctx2.beginPath();
    ctx2.arc(cx,cy,cellSize/2.2,0,Math.PI*2);
    ctx2.fill();
   }else{
    ctx2.fillStyle=colors.bg;
    ctx2.fillRect(ox+x*cellSize,oy+y*cellSize,cellSize,cellSize);
   }
  }
 }
 
 // 出口
 if(map.exits) map.exits.forEach(e=>{
  ctx2.fillStyle='#d4a574';
  ctx2.fillRect(ox+e.x*cellSize,oy+e.y*cellSize,cellSize,cellSize);
 });
 
 // NPC
 if(map.npcs) map.npcs.forEach(n=>{
  ctx2.fillStyle='#F72585';
  ctx2.beginPath();
  ctx2.arc(ox+n.x*cellSize+cellSize/2,oy+n.y*cellSize+cellSize/2,cellSize/2.5,0,Math.PI*2);
  ctx2.fill();
 });
 
 // 物品
 if(map.items) map.items.forEach(it=>{
  const key=`${state.currentMap}_${it.x}_${it.y}`;
  if(state.collectedItems[key]) return;
  ctx2.fillStyle='#f7b731';
  ctx2.beginPath();
  ctx2.arc(ox+it.x*cellSize+cellSize/2,oy+it.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
  ctx2.fill();
 });
 
 // 玩家位置
 ctx2.fillStyle='#EF476F';
 ctx2.beginPath();
 ctx2.arc(ox+state.player.x*cellSize+cellSize/2,oy+state.player.y*cellSize+cellSize/2,cellSize/2.2,0,Math.PI*2);
 ctx2.fill();
 ctx2.strokeStyle='#fff';
 ctx2.lineWidth=2;
 ctx2.stroke();
 
 // 图例
 const legend=document.getElementById('minimap-legend');
 legend.innerHTML=`
  <span style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;margin-right:8px"><span style="width:10px;height:10px;border-radius:50%;background:#EF476F;display:inline-block;border:1px solid #fff"></span>玩家</span>
  <span style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;margin-right:8px"><span style="width:10px;height:10px;border-radius:50%;background:#2E7D32;display:inline-block"></span>树木</span>
  <span style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;margin-right:8px"><span style="width:10px;height:10px;border-radius:50%;background:#F72585;display:inline-block"></span>NPC</span>
  <span style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem"><span style="width:10px;height:10px;border-radius:50%;background:#f7b731;display:inline-block"></span>物品</span>
 `;
 
 showPanel('panel-minimap');
}

function switchPokemon(index){
 const battle=state.battle;
 const newPokemon=state.team[index];
 
 if(newPokemon.hp<=0){
  setMsg(`${newPokemon.name}无法战斗！`);
  return;
 }
 
 if(newPokemon===battle.player){
  setMsg(`${newPokemon.name}已经在场上了！`);
  return;
 }
 
 battle.player=newPokemon;
 battle.playerHP=newPokemon.hp;
 battle.maxPlayerHP=newPokemon.maxHp;
 
 setMsg(`去吧！${newPokemon.name}！`);
 
 document.getElementById('switch-menu').classList.add('hidden');
 document.getElementById('battle-menu').classList.remove('hidden');
 updateBattleUI();
 
 const round=state.battleRound+1;
 state.battleRound=round;
 
 setTimeout(()=>{
  if(state.battleRound!==round||!state.battle||state.battle.enemyHP<=0) return;
  enemyTurn();
 },800);
}

function calculateDamage(attacker,defender,move){
 const multiplier=typeMultiplier(move.type,defender.types);
 const attackStat=move.category==='physical'?attacker.stats.atk:attacker.stats.spa;
 const defenseStat=move.category==='physical'?defender.stats.def:defender.stats.spd;
 const critical=Math.random()<0.0625;
 
 const damage=Math.max(1,Math.floor(
  (((2*attacker.level)/5+2)*move.power*(attackStat/defenseStat))/50+2
 )*(critical?1.5:1)*multiplier*(random(85,100)/100));
 
 return{damage:Math.floor(damage),multiplier,critical};
}

function useMove(index){
 const battle=state.battle;
 if(!battle||battle.enemyHP<=0) return;
 
 const move=battle.player.moves[index];
 if(!move||move.pp<=0) return;
 
 move.pp--;
 const result=calculateDamage(battle.player,battle.enemy,move);
 battle.enemyHP=Math.max(0,battle.enemyHP-result.damage);
 
 let message=`${battle.player.name}使用了「${move.name}」！`;
 if(result.multiplier>1) message+=' 效果拔群！';
 if(result.multiplier>0&&result.multiplier<1) message+=' 效果不太好...';
 if(result.multiplier===0) message+=' 没有效果...';
 if(result.critical) message+=' 会心一击！';
 message+=` 造成了${result.damage}点伤害！`;
 setMsg(message);
 
 if(battle.enemyHP<=0){
  endBattle(true);
  return;
 }
 
 document.getElementById('battle-actions').classList.add('hidden');
 document.getElementById('battle-menu').classList.remove('hidden');
 
 const round=state.battleRound+1;
 state.battleRound=round;
 
 setTimeout(()=>{
  if(state.battleRound!==round||!state.battle||state.battle.enemyHP<=0) return;
  enemyTurn();
  updateBattleUI();
 },600);
}

function throwBall(){
 const battle=state.battle;
 if(!battle||!state.bag.pokeball||state.bag.pokeball<=0) return;
 
 state.bag.pokeball--;
 
 // 冰系稀有精灵100%捕捉率
 let catchRate;
 if(battle.enemy.captureRate===100){
  catchRate=1.0;
 }else{
  catchRate=(1-battle.enemyHP/battle.maxEnemyHP)*0.45*1.5;
 }
 
 setMsg('扔出了精灵球！...');
 
 setTimeout(()=>{
  if(Math.random()<catchRate){
   setMsg(`太棒了！${battle.enemy.name}被抓到了！`);
   state.caught[battle.enemy.id]=true;
   state.seen[battle.enemy.id]=true;
   battle.enemy.hp=battle.maxEnemyHP;
   addToTeam(battle.enemy);
   endBattle(false,true);
  }else{
   setMsg('...摇动了！...'+`${battle.enemy.name}挣脱了！`);
   const round=state.battleRound+1;
   state.battleRound=round;
   setTimeout(()=>{
    if(state.battleRound!==round||!state.battle||state.battle.enemyHP<=0) return;
    enemyTurn();
    updateBattleUI();
   },500);
  }
 },800);
}

function useItem(){
 const choices=[];
 if(state.bag.pokeball>0&&state.battle.wild) choices.push({
  text:`精灵球(${state.bag.pokeball})`,
  action:()=>{state.bag.pokeball--;throwBall();}
 });
 if(state.bag['great-ball']>0&&state.battle.wild) choices.push({
  text:`超级球(${state.bag['great-ball']})`,
  action:()=>{state.bag['great-ball']--;throwBall('great');}
 });
 if(state.bag.potion>0) choices.push({
  text:`伤药(${state.bag.potion})`,
  action:()=>{state.bag.potion--;usePotion(20);}
 });
 if(state.bag['super-potion']>0) choices.push({
  text:`好伤药(${state.bag['super-potion']})`,
  action:()=>{state.bag['super-potion']--;usePotion(50);}
 });
 if(!choices.length){
  setMsg('背包没有可用道具！');
  return;
 }
 choices.push({text:'取消',action:()=>{}});
 showChoices('选择道具：',choices);
}

function usePotion(amount){
 const battle=state.battle;
 battle.playerHP=Math.min(battle.maxPlayerHP,battle.playerHP+amount);
 setMsg(`使用了伤药！恢复了${amount}HP！`);
 updateBattleUI();
}

function tryRun() {
  const battle = state.battle;
  if (battle.legendary || battle.gym || battle.trainer) {
    setMsg('无法逃跑！对手的压迫感太强了！');
    return;
  }
  setMsg('成功逃走了！你迅速离开了战场。');
  endBattle(false, false, true);
}

function enemyTurn(){
 const battle=state.battle;
 if(!battle||battle.enemyHP<=0) return;
 
 const availableMoves=battle.enemy.moves.filter(m=>m.pp>0);
 if(!availableMoves.length){
  setMsg(`${battle.enemy.name}无法出招！`);
  return;
 }
 
 const move=availableMoves[random(0,availableMoves.length-1)];
 move.pp--;
 const result=calculateDamage(battle.enemy,battle.player,move);
 battle.playerHP=Math.max(0,battle.playerHP-result.damage);
 
 let message=`${battle.enemy.name}使用了「${move.name}」！`;
 if(result.multiplier>1) message+=' 效果拔群！';
 message+=` 造成了${result.damage}点伤害！`;
 setMsg(message);
 
 if(battle.playerHP<=0){
  // 检查是否有其他存活精灵可以切换
  const aliveTeam=state.team.filter(p=>p.hp>0&&p!==battle.player);
  if(aliveTeam.length>0){
   setMsg(`${battle.player.name}倒下了！请选择下一只精灵！`);
   document.getElementById('battle-menu').classList.add('hidden');
   document.getElementById('switch-menu').classList.remove('hidden');
   showSwitchMenu();
   return;
  }
  endBattle(false);
  return;
 }
 updateBattleUI();
}

function endBattle(playerWon,caught=false,isRun=false){
 const battle=state.battle;
 if(!battle) return; // 防止重复调用
 let expGain=0,moneyGain=0;
 
 if(caught){
  const pokemon=battle.enemy;
  showDialog(`您已成功捕获 <strong>${pokemon.name}</strong>！<br>图鉴已经登录信息。`);
 }else if(playerWon){
  expGain=battle.enemy.level*15+random(20,60);
  moneyGain=battle.enemy.level*20+random(30,80);
  
  if(battle.gym){
   moneyGain*=3;
   if(battle.gymTeam&&battle.gymIndex<battle.gymTeam.length-1){
    state.battleRound++; // 防止旧回调干扰
    battle.gymIndex++;
    const next=battle.gymTeam[battle.gymIndex];
    battle.enemy=next;
    battle.enemyHP=next.maxHp;
    battle.maxEnemyHP=next.maxHp;
    setMsg(`道馆训练家派出${next.name}！`);
    updateBattleUI();
    render();
    return;
   }
   if(battle.gym){
    state.badges++;
    moneyGain+=3000;
    showDialog('你战胜了矿山道馆！获得「岩石徽章」！');
   }
  }else if(battle.trainer){
   moneyGain=(battle.trainerMoney||100)*3;
   if(battle.trainerTeam&&battle.trainerIndex<battle.trainerTeam.length-1){
    state.battleRound++; // 防止旧回调干扰
    battle.trainerIndex++;
    const next=battle.trainerTeam[battle.trainerIndex];
    battle.enemy=next;
    battle.enemyHP=next.maxHp;
    battle.maxEnemyHP=next.maxHp;
    setMsg(`${battle.trainerName||'训练家'}派出${next.name}！`);
    updateBattleUI();
    render();
    return;
   }
  }else if(battle.legendary){
   moneyGain+=2000;
   showDialog('星辉龙化作光芒消散，但你感到与它建立了某种联系！');
  }
  
  const evoResults=giveExpToAll(expGain);
  state.money+=moneyGain;
  
  const player=state.team[0];
  if(player) player.hp=Math.min(player.maxHp,player.hp+Math.floor(player.maxHp*0.3));
  
  let resultMsg=`<h3>战斗胜利！</h3>`;
  resultMsg+=`<p>获得经验: +${expGain}</p>`;
  resultMsg+=`<p>获得金币: +${moneyGain}</p>`;
  
  if(evoResults.length>0){
   evoResults.forEach(r=>{
    if(r.type==='evo'){
     resultMsg+=`<p style="color:#f7b731">${r.pokemon} 进化成了 ${r.to}！</p>`;
    }else if(r.type==='skill'){
     resultMsg+=`<p style="color:#4cc9f0">${r.pokemon} 学会了「${r.name}」！</p>`;
    }
   });
  }
  
  showDialog(resultMsg);
  
 }else if(!playerWon){
  if(isRun){
   // 逃跑：只是退出战斗，不传送
   setMsg('成功逃走了！');
  }else{
   // 战败：传送回起始镇
   state.currentMap='start-town';
   state.player.x=12;
   state.player.y=14;
   state.team.forEach(p=>{ 
    p.hp=p.maxHp; 
    p.moves.forEach(m=>m.pp=m.maxPp); 
   });
   
   showDialog(`你的精灵全部倒下了...<br>被紧急传送到起始镇的精灵中心接受治疗。`,()=>{
    render();
   });
  }
 }
 
 setTimeout(()=>{
  state.scene='world';
  document.getElementById('battle-hud').classList.remove('active');
  document.getElementById('message-box').classList.remove('active');
  document.getElementById('battle-status').style.display='none';
  document.getElementById('capture-hint').classList.remove('active');
  document.getElementById('quick-bar').classList.remove('battle-hidden');
 document.getElementById('virtual-dpad').classList.remove('battle-hidden');
  state.battle=null;
  document.getElementById('dialog').classList.remove('active');
  spawnWildPokemon();
  updateInteractHint();
  render();
 },1500);
}

 const bar=document.getElementById('quick-bar');
 if(bar.classList.contains('collapsed')){
  bar.classList.remove('collapsed');

 }else{
  bar.classList.add('collapsed');
  document.getElementById('btn-collapse').innerHTML='<span class="icon">▶</span>';

};

document.getElementById('btn-bag').onclick=openBagMenu;
document.getElementById('btn-pokedex').onclick=openPokedex;
document.getElementById('btn-info').onclick=()=>{
 showDialog(`<h3>玩家信息</h3>
<p><strong>位置：</strong>${MAPS[state.currentMap].name}</p>
<p><strong>金币：</strong>${state.money}</p>
<p><strong>徽章：</strong>${state.badges}</p>
<p><strong>队伍精灵：</strong>${state.team.length}只</p>
<p><strong>存储精灵：</strong>${state.storage.length}只</p>
<p><strong>背包道具：</strong>${Object.values(state.bag).reduce((s,v)=>s+v,0)}个</p>
<p><strong>游戏时间：</strong>${Math.floor((Date.now()-state.startTime)/60000)}分钟</p>
<p><strong>版本：</strong>${GAME_VERSION}</p>`);
};

 renderMinimap();
};

 hidePanel('panel-minimap');
};

 hidePanel('panel-bag');

 hidePanel('panel-pokedex');
};
document.getElementById('btn-starter-close').onclick=()=>{
 hidePanel('panel-starter');
};

 hidePanel('panel-pokemon');
 showPanel('panel-team');
};

 // =========== 游戏循环 ===========
function gameLoop(){
 if(state.scene==='world'){
  updateWildPokemon();
  render();
 }
 requestAnimationFrame(gameLoop);
}

setInterval(()=>{
 if(state.scene==='world'&&state.wildPokemon.length) render();
},800);

// =========== 初始化 ===========
function init(){
 // 版本更新日志：首次访问或版本更新时显示
 const seenVer=localStorage.getItem('pokemon_seen_version');
 if(seenVer!==GAME_VERSION){
  showChangelog();
 }
 
 resize();
 spawnWildPokemon();
 
 // BGM 自动播放
 const bgm=document.getElementById('bgm');
 if(bgm){
  bgm.volume=0.3;
  const playBgm=()=>{
   bgm.play().catch(()=>{});
   document.removeEventListener('click',playBgm);
   document.removeEventListener('keydown',playBgm);
  };
  document.addEventListener('click',playBgm,{once:true});
  document.addEventListener('keydown',playBgm,{once:true});
 }
 
 // 加载存档
 const saved=localStorage.getItem('pokemon_save');
 if(saved){
  try{
   const loaded=JSON.parse(saved);
   Object.assign(state,loaded);
   showDialog('游戏存档已加载！');
  }catch(e){
   console.log('存档加载失败');
  }
 }
 
 // 等待图片加载完成后再初始化界面
 const afterInit = () => {
  if(state.team.length>0){
   state.scene='world';
   render();
   gameLoop();
  }else{
   state.scene='world';
   render();
   showStarterSelect();
   gameLoop();
  }
 };
 
 loadSpriteImages().then(()=>{
  console.log('🎮 游戏初始化完成！版本 ' + GAME_VERSION);
  console.log('🌐 在线预览: https://nandy5474.github.io/pokemon-star-adventure/');
  console.log('📁 本地文件: ' + window.location.href);
  if (window.location.protocol === 'file:') {
   console.log('💡 提示: 本地运行中，GitHub同步后可在浏览器中访问在线版本');
  }
  afterInit();
 }).catch(e => {
  console.error('图片加载失败:', e);
  afterInit();
 });
}

init();

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
